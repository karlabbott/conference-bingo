<VirtualHost *:443>
    ServerName summit.99b.org

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/summit.99b.org/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/summit.99b.org/privkey.pem

    # Reverse proxy to Gunicorn
    ProxyPreserveHost On
    ProxyPass         / http://127.0.0.1:5000/
    ProxyPassReverse  / http://127.0.0.1:5000/

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"

    ErrorLog  /var/log/httpd/bingo-ssl-error.log
    CustomLog /var/log/httpd/bingo-ssl-access.log combined
</VirtualHost>
